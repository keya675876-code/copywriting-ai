<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>爆文助手 AI</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: rgba(255, 255, 255, 0.86);
      --text: #111827;
      --muted: #6b7280;
      --border: rgba(17, 24, 39, 0.1);
      --primary: #111827;
      --primary-soft: #eef2ff;
      --radius: 24px;
      --shadow: 0 24px 80px rgba(15, 23, 42, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(199, 210, 254, 0.7), transparent 34%),
        radial-gradient(circle at top right, rgba(186, 230, 253, 0.7), transparent 28%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
    }

    .page {
      width: min(1080px, 100%);
      margin: 0 auto;
      padding: 32px 20px 56px;
    }

    .hero {
      display: grid;
      gap: 18px;
      margin: 30px 0 28px;
      text-align: center;
    }

    .badge {
      width: fit-content;
      margin: 0 auto;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.7);
      color: var(--muted);
      font-size: 13px;
      backdrop-filter: blur(16px);
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 8vw, 72px);
      line-height: 0.96;
      letter-spacing: -0.07em;
    }

    .hero p {
      width: min(680px, 100%);
      margin: 0 auto;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
    }

    .app-card {
      display: grid;
      grid-template-columns: 0.92fr 1.08fr;
      gap: 20px;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 8px);
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.74);
      overflow: hidden;
    }

    .panel-header {
      padding: 18px 18px 0;
    }

    .panel-header h2 {
      margin: 0 0 8px;
      font-size: 18px;
      letter-spacing: -0.03em;
    }

    .panel-header p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    form {
      display: grid;
      gap: 14px;
      padding: 18px;
    }

    label {
      display: grid;
      gap: 8px;
      color: #374151;
      font-size: 13px;
      font-weight: 600;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 13px 14px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--text);
      font: inherit;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
      line-height: 1.65;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(79, 70, 229, 0.45);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.09);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 4px;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 14px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      transform: none;
    }

    .primary-btn {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 16px 34px rgba(17, 24, 39, 0.22);
    }

    .ghost-btn {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .result-wrap {
      display: flex;
      flex-direction: column;
      min-height: 620px;
    }

    .result-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px;
      border-bottom: 1px solid var(--border);
    }

    .status {
      color: var(--muted);
      font-size: 13px;
    }

    .result {
      flex: 1;
      padding: 20px;
      white-space: pre-wrap;
      line-height: 1.82;
      font-size: 15px;
      overflow: auto;
    }

    .empty {
      height: 100%;
      min-height: 420px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 32px;
    }

    .empty strong {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 18px;
    }

    @keyframes dot-blink {
      0%, 20%, 50%, 80%, 100% {
        opacity: 1;
      }
      40% {
        opacity: 0.4;
      }
      60% {
        opacity: 0.7;
      }
    }

    .loading-dots span {
      animation: dot-blink 1.4s infinite;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    .notice {
      margin-top: 16px;
      padding: 12px 14px;
      border: 1px solid rgba(245, 158, 11, 0.25);
      border-radius: 18px;
      background: rgba(255, 251, 235, 0.8);
      color: #92400e;
      font-size: 13px;
      line-height: 1.65;
    }

    .footer {
      margin-top: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 820px) {
      .page {
        padding: 22px 14px 42px;
      }

      .hero {
        margin-top: 18px;
      }

      .app-card {
        grid-template-columns: 1fr;
        padding: 12px;
        border-radius: 28px;
      }

      .row {
        grid-template-columns: 1fr;
      }

      .result-wrap {
        min-height: 480px;
      }

      .result-toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .result-toolbar button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="badge">AI Copywriting Assistant</div>
      <h1>爆文助手 AI</h1>
      <p>输入主题，选择平台和风格，一键生成标题、正文、钩子、CTA、标签与视频建议。适合小红书、TikTok、Instagram 和电商内容。</p>
    </section>

    <section class="app-card">
      <div class="panel">
        <div class="panel-header">
          <h2>生成设置</h2>
          <p>先用最少信息跑通产品，后续再加登录、收藏、历史记录和支付。</p>
        </div>

        <form id="copyForm">
          <label>
            产品 / 主题
            <textarea id="topic" placeholder="例如：一款适合通勤女生的轻薄防晒霜" required></textarea>
          </label>

          <div class="row">
            <label>
              平台
              <select id="platform">
                <option>小红书</option>
                <option>TikTok</option>
                <option>Instagram</option>
                <option>Facebook</option>
                <option>电商平台</option>
                <option>微信公众号</option>
              </select>
            </label>

            <label>
              风格
              <select id="style">
                <option>爆款种草风</option>
                <option>专业测评风</option>
                <option>高端品牌风</option>
                <option>轻松搞笑风</option>
                <option>情绪共鸣风</option>
                <option>极简高级风</option>
              </select>
            </label>
          </div>

          <label>
            目标用户
            <input id="audience" placeholder="例如：20-30岁通勤女性，可不填" />
          </label>

          <label>
            营销目标（选填）
            <input id="goal" list="goalOptions" placeholder="例如：提升点击和转化，可不填" />
            <datalist id="goalOptions">
              <option value="提升点击">
              <option value="提升转化">
              <option value="提升互动">
              <option value="品牌宣传">
              <option value="增加粉丝">
              <option value="促进下单">
            </datalist>
          </label>

          <div class="actions">
            <button class="primary-btn" id="generateBtn" type="submit">生成文案</button>
            <button class="ghost-btn" id="clearBtn" type="button">清空结果</button>
          </div>

          <div class="notice">
            注意：这个单文件版本会暴露 Dify API Key，只适合本地测试。正式上线建议把 API Key 放到后端代理接口里。
          </div>
        </form>
      </div>

      <div class="panel result-wrap">
        <div class="result-toolbar">
          <div>
            <h2 style="margin:0 0 6px;font-size:18px;letter-spacing:-0.03em;">生成结果</h2>
            <div class="status" id="status">等待输入</div>
          </div>
          <button class="ghost-btn" id="copyBtn" type="button">复制结果</button>
        </div>

        <div class="result" id="result">
          <div class="empty">
            <div>
              <strong>你的文案会显示在这里</strong>
              填写左侧内容后，点击"生成文案"。
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="footer">Powered by Dify API · Web App MVP</div>
  </main>

  <script>
    // 1. 替换成你的 Dify API Key
    const DIFY_API_KEY = "app-9SmZ7enyK67ZItXQwQxkr6r4";

    // 2. Dify Chat App 默认接口，一般不用改
    const DIFY_API_URL = "https://api.dify.ai/v1/chat-messages";

    const form = document.getElementById("copyForm");
    const generateBtn = document.getElementById("generateBtn");
    const clearBtn = document.getElementById("clearBtn");
    const copyBtn = document.getElementById("copyBtn");
    const resultEl = document.getElementById("result");
    const statusEl = document.getElementById("status");

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function setResult(text) {
      resultEl.textContent = text;
    }

    function getFormValues() {
      return {
        topic: document.getElementById("topic").value.trim(),
        platform: document.getElementById("platform").value,
        style: document.getElementById("style").value,
        audience: document.getElementById("audience").value.trim() || "普通消费者",
        goal: document.getElementById("goal").value.trim() || "提升点击"
      };
    }

    async function callDifyStreaming(values, onChunk) {
      var makeRequest = function () {
        return fetch(DIFY_API_URL, {
          method: "POST",
          headers: {
            "Authorization": "Bearer " + DIFY_API_KEY,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            inputs: {
              topic: values.topic,
              platform: values.platform,
              style: values.style,
              audience: values.audience,
              goal: values.goal
            },
            query: "请为\"" + values.topic + "\"生成适合" + values.platform + "的" + values.style + "文案。",
            response_mode: "streaming",
            user: "web-app-user"
          })
        });
      };

      var response = await makeRequest();

      if (!response.ok) {
        var errorText = "";
        try {
          errorText = await response.text();
        } catch (_) {}
        if (response.status === 401 || response.status === 403) {
          throw new Error("API Key 无效或无权访问该应用 (HTTP " + response.status + ")。请检查 Dify 后台 API 密钥是否正确。");
        }
        throw new Error(errorText || ("Dify API 请求失败 (HTTP " + response.status + ")"));
      }

      var reader = response.body.getReader();
      var decoder = new TextDecoder();
      var buffer = "";
      var hasContent = false;

      while (true) {
        var chunk = await reader.read();
        if (chunk.done) break;

        buffer += decoder.decode(chunk.value, { stream: true });
        var lines = buffer.split("\n");
        buffer = lines.pop() || "";

        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line || line.indexOf("data: ") !== 0) continue;

          var jsonStr = line.slice(6);
          var event = null;
          try {
            event = JSON.parse(jsonStr);
          } catch (_) {
            continue;
          }

          if (event.event === "error") {
            throw new Error(event.message || event.code || "Dify 服务端返回错误");
          }

          if (event.event === "message" || event.event === "agent_message") {
            if (event.answer) {
              hasContent = true;
              onChunk(event.answer);
            }
          }
        }
      }

      if (!hasContent) {
        throw new Error("Dify 未返回任何内容。请检查：\n1. Dify 应用中是否配置了正确的模型\n2. 变量名是否与代码中一致 (topic, platform, style, audience, goal)\n3. 应用配额是否已用完");
      }
    }

    // 检测 file:// 协议
    if (window.location.protocol === "file:") {
      window.addEventListener("DOMContentLoaded", function () {
        setStatus("请使用 VS Code 的 Live Server 打开本页面，不要直接双击 HTML 文件。");
      });
    }

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      var values = getFormValues();
      if (!values.topic) {
        setStatus("请先输入产品或主题");
        return;
      }

      if (!DIFY_API_KEY || DIFY_API_KEY === "替换成你的_DIFY_API_KEY") {
        setStatus("请先填写 Dify API Key");
        setResult("你还没有在代码中填写 DIFY_API_KEY。\n\n请打开 index.html，找到：\nconst DIFY_API_KEY = \"替换成你的_DIFY_API_KEY\";\n\n然后替换成你在 Dify 后台拿到的 API Key。");
        return;
      }

      generateBtn.disabled = true;
      generateBtn.textContent = "生成中...";
      setStatus("正在生成，请稍候...");
      resultEl.innerHTML = '<div class="empty"><div><strong>AI 正在生成文案，请稍候<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span></strong></div></div>';

      try {
        await callDifyStreaming(values, function (chunk) {
          resultEl.textContent += chunk;
        });
        if (!resultEl.textContent.trim()) {
          setStatus("生成失败");
          setResult("Dify 返回了空内容。\n\n可能原因：\n1. API Key 权限不足\n2. Dify 应用未发布 API 访问\n3. 应用配额已用完\n4. 模型配置有误\n\n请打开浏览器开发者工具 (F12) -> Console 查看详细日志。");
        } else {
          setStatus("生成完成");
        }
      } catch (error) {
        console.error("Dify API 错误:", error);
        setStatus("生成失败");
        setResult("请求失败：\n" + error.message + "\n\n排查建议：\n1. 确认 API Key 是否正确\n2. 确认 Dify 应用已「发布」并开启 API 访问\n3. 如提示 goal 等字段值不合法，请到 Dify 后台将该变量改为「文本」类型或添加对应选项\n4. 确认使用 Live Server 而非 file:// 打开\n5. Agent Chat App 必须使用 streaming 模式");
      } finally {
        generateBtn.disabled = false;
        generateBtn.textContent = "生成文案";
      }
    });

    clearBtn.addEventListener("click", function () {
      resultEl.innerHTML = '<div class="empty"><div><strong>你的文案会显示在这里</strong>填写左侧内容后，点击"生成文案"。</div></div>';
      setStatus("等待输入");
    });

    copyBtn.addEventListener("click", async function () {
      var text = resultEl.innerText.trim();
      if (!text || text.includes("你的文案会显示在这里")) {
        setStatus("暂无可复制内容");
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        setStatus("已复制到剪贴板");
      } catch (error) {
        setStatus("复制失败，请手动选择复制");
      }
    });
  </script>
</body>
</html>
